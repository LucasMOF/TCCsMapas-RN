<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de TCCs - RN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .stats-card { border-left: 5px solid #0d6efd; }
        .ranking-card { border-left: 5px solid #198754; }
        #map-placeholder { background: #e9ecef; height: 300px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 2px dashed #ccc; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">📍 Mapa de TCCs - Rio Grande do Norte</span>
    </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card stats-card shadow-sm p-3 mb-3">
                <h6 class="text-muted">Total de TCCs</h6>
                <h2 id="total-tccs">0</h2>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card ranking-card shadow-sm p-3 mb-3">
                <h6 class="text-muted">Top Orientadores</h6>
                <div id="lista-orientadores" class="d-flex flex-wrap gap-2">
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm p-4 mb-4">
        <h5>Cadastrar Novo TCC</h5>
        <div class="row g-3">
            <div class="col-md-2"><input type="number" id="cadId" class="form-control" placeholder="ID"></div>
            <div class="col-md-5"><input type="text" id="cadDiscente" class="form-control" placeholder="Nome do Aluno"></div>
            <div class="col-md-5"><input type="text" id="cadOrientador" class="form-control" placeholder="Orientador"></div>
            <div class="col-md-9"><input type="text" id="cadTitulo" class="form-control" placeholder="Título do Trabalho"></div>
            <div class="col-md-3"><input type="text" id="cadMunicipio" class="form-control" placeholder="Município"></div>
            <div class="col-12"><button class="btn btn-success w-100" onclick="executarCadastro()">Cadastrar no Sistema</button></div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-5">
            <div class="card shadow-sm p-4 mb-4">
                <h5>Busca por Mapa</h5>
                <div class="input-group mb-3">
                    <input type="text" id="municipioInput" class="form-control" placeholder="Digite o município">
                    <button class="btn btn-primary" onclick="buscarTccsPorMunicipio()">Buscar</button>
                </div>
                <div id="map-placeholder">
                    <p class="text-muted">[ Espaço para o Mapa do RN ]</p>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm p-4">
                <h5>Resultados</h5>
                <table class="table table-hover mt-2">
                    <thead class="table-light">
                    <tr>
                        <th>Discente</th>
                        <th>Título</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody id="tabela-corpo"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api/tccs';

    async function carregarEstatisticas() {
        try {
            const response = await fetch(`${API_URL}/estatisticas`);
            const data = await response.json();

            // Atualiza total
            document.getElementById('total-tccs').innerText = data.totalTccs;

            // Atualiza Ranking de Orientadores
            const rankingDiv = document.getElementById('lista-orientadores');
            rankingDiv.innerHTML = '';
            data.porProfessor.slice(0, 5).forEach(prof => {
                rankingDiv.innerHTML += `<span class="badge bg-light text-dark border p-2">
                    ${prof[0]}: <strong>${prof[1]}</strong></span>`;
            });
        } catch (error) { console.error("Erro estatísticas:", error); }
    }

    async function buscarTccsPorMunicipio() {
        const municipio = document.getElementById('municipioInput').value;
        const tabela = document.getElementById('tabela-corpo');
        tabela.innerHTML = '<tr><td colspan="3" class="text-center">Buscando...</td></tr>';

        try {
            const response = await fetch(`${API_URL}/busca?municipio=${municipio}`);
            const tccs = await response.json();
            tabela.innerHTML = '';
            if (tccs.length === 0) {
                tabela.innerHTML = '<tr><td colspan="3" class="text-center text-danger">Nada encontrado.</td></tr>';
                return;
            }
            tccs.forEach(tcc => {
                tabela.innerHTML += `<tr>
                    <td>${tcc.discente}</td>
                    <td class="small">${tcc.titulo}</td>
                    <td><button class="btn btn-sm btn-outline-success" onclick="alert('Download ID: ${tcc.id}')">💾</button></td>
                </tr>`;
            });
        } catch (error) { console.error("Erro busca:", error); }
    }

    async function executarCadastro() {
        const novoTcc = {
            id: document.getElementById('cadId').value,
            discente: document.getElementById('cadDiscente').value,
            titulo: document.getElementById('cadTitulo').value,
            orientador: document.getElementById('cadOrientador').value,
            municipio: document.getElementById('cadMunicipio').value
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(novoTcc)
            });

            if (response.ok) {
                alert("TCC cadastrado com sucesso!");
                carregarEstatisticas(); // Atualiza contador e ranking
            }
        } catch (error) { alert("Erro ao cadastrar."); }
    }

    carregarEstatisticas();
</script>
</body>
</html>
