<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estatísticas de TCCs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        .stats-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
        }
        .total-highlight {
            font-size: 1.5em;
            color: #0056b3;
            font-weight: bold;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #0056b3;
            color: white;
            text-align: center;
        }
        td.nome-prof {
            text-align: left;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        .badge {
            background: #e9ecef;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.9em;
            font-weight: bold;
        }
        .badge-total {
            background: #28a745;
            color: white;
        }
    </style>
</head>
<body>

<div class="stats-container">
    <h1>Painel de Estatísticas</h1>

    <div class="total-highlight">
        Total de TCCs Cadastrados: <span id="totalTccs">Carregando...</span>
    </div>

    <table>
        <thead>
        <tr>
            <th style="text-align: left;">Professor(a)</th>
            <th>Como Orientador(a)</th>
            <th>Em Bancas (Examinador)</th>
            <th>Total de Participações</th>
        </tr>
        </thead>
        <tbody id="tabela-professores">
        </tbody>
    </table>
</div>

<script src="/stats.js"></script>
</body>
</html>
